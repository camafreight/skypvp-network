server:
  id: unknown
  role: LOBBY
world-state:
  enabled: true
  preset-id: default
  preset-root: world-templates
redis:
  enabled: true
  host: redis
  port: 6379
  password: ""
  database: 0
postgres:
  enabled: true
  host: postgres
  port: 5432
  database: skypvp_network
  username: skypvp
  password: change-me
chat:
  clear-lines: 150
  moderation:
    enabled: false
    endpoint: ""
    api-key: ""
    language: eng
    category3-threshold: 0.75
    honor-review-recommended: true
    flags-before-warn: 2
    warns-before-mute: 2
    mute-duration-seconds: 3600
  defaults:
    rank:
      priority: 0
      prefix: ""
      name_color: white
      name: "%player_name%"
      suffix: ""
      chat_color: white
    private:
      prefix: "<#FFD700>["
      name_color: gold
      name: "%player_name%"
      suffix: "<#FFD700> → %target_name%]<reset>"
      chat_color: gray
    party:
      prefix: "<#55FFFF>[Party] <reset>"
      name_color: aqua
      name: "%player_name%"
      suffix: ""
      chat_color: white

# Network resource pack is owned by Velocity (self-host on the public proxy LoadBalancer).
# Paper backends should leave this disabled to avoid ClusterIP download failures / limbo kick loops.
resource-pack:
  enabled: false
  force: false
  url: ""
  sha1: ""
  uuid: "a7c3e9f1-5b2d-4e8a-9c1f-0d6b4a8e2f35"
  prompt: "<gold>SkyPvP</gold> <gray>requires its resource pack for weapons, lasers, and effects."
  kick-message: "<red>You must accept the SkyPvP resource pack to play."
  serve-locally: false
  serve-port: 8765
  public-host: ""
  local-file: "skypvp-core.zip"
  apply-timeout-seconds: 45
