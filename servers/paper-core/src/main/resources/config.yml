server:
  id: unknown
  role: LOBBY
world-state:
  enabled: true
  preset-id: default
  preset-root: world-templates
redis:
  enabled: true
  host: redis
  port: 6379
  password: ""
  database: 0
postgres:
  enabled: true
  host: postgres
  port: 5432
  database: skypvp_network
  username: skypvp
  password: change-me
chat:
  clear-lines: 150
  moderation:
    enabled: false
    endpoint: ""
    api-key: ""
    language: eng
    category3-threshold: 0.75
    honor-review-recommended: true
    flags-before-warn: 2
    warns-before-mute: 2
    mute-duration-seconds: 3600
  defaults:
    rank:
      priority: 0
      prefix: ""
      name_color: white
      name: "%player_name%"
      suffix: ""
      chat_color: white
    private:
      prefix: "<#FFD700>["
      name_color: gold
      name: "%player_name%"
      suffix: "<#FFD700> → %target_name%]<reset>"
      chat_color: gray
    party:
      prefix: "<#55FFFF>[Party] <reset>"
      name_color: aqua
      name: "%player_name%"
      suffix: ""
      chat_color: white
