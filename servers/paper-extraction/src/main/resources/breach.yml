# Aether Breach runtime configuration for extraction pods.
# Map templates are loaded from SPVP_MAP_TEMPLATE_ROOT or ../../config/map-templates

maps-file: breach-maps.yml

settings:
  max-breaches-per-pod: 9
  max-players-per-pod: 500
  min-players: 1
  # Per-player countdown in the extraction lobby before dropping into an active breach map.
  starting-countdown-seconds: 15
  reset-delay-seconds: 8
  queue-timeout-seconds: 180
  world-prewarm-per-template: 1
  # Folia pods default this to 0 unless set explicitly. Paper pods benefit from 1 standby world per template.
  extract-dwell-seconds: 5
  combat-tag-seconds: 15
  default-map: aether-ruins
  auto-discover-chests: false
  default-loot-tier: defaultChests
  extract-closing-soon-seconds: 300
  extract-zone-particles-enabled: false
  extract-zone-fake-beacon-enabled: true
  enhanced-loot-chests: true
  place-configured-chest-blocks: true
  loot-chest-ambient-interval-ticks: 40
  loot-chest-ambient-radius: 8.0

# SkyPvP hitscan: bullet weapons resolve in one WM raycast tick (no ticking fake projectiles).
# Grenades, rockets, melee, and other listed weapons keep normal WM projectile simulation.
hitscan:
  enabled: true
  max-range-blocks: 120
  tracer-spacing-blocks: 3.0
  tracer-view-range-blocks: 48
  tracer-particle: CRIT
  impact:
    enabled: true
    view-range-blocks: 48
    block-particle-count: 6
    entity-particle-count: 4
    block-chip-overlay: true
    block-chip-damage: 0.22
    entity-particle: ENCHANTED_HIT
  visuals:
    defer-ticks: 1
    max-jobs-per-tick: 64
    queue-capacity: 2048
    max-tracer-points: 20
    async-prep: true
  combat:
    # Worker threads that schedule ray hits onto region threads (0 = schedule directly from shoot event).
    dispatch-threads: 4
    queue-capacity: 4096
    defer-ticks: 0
  simulated-projectile-weapons:
    - Combat_Knife
    - Stim
    - Grenade
    - Semtex
    - Flashbang
    - Cluster_Grenade
    - Airstrike
    - Sky_Torch
    - RPG_7
    - Fatman

loot-chest-fx:
  defaultChests:
    particle: END_ROD
    sound: BLOCK_NOTE_BLOCK_CHIME
    volume: 0.35
    pitch: 0.95
    particle-count: 4
    particle-speed: 0.01
    glow-color: yellow
  common:
    particle: END_ROD
    sound: BLOCK_NOTE_BLOCK_CHIME
    volume: 0.35
    pitch: 1.0
    particle-count: 4
    particle-speed: 0.01
    glow-color: yellow
  rare:
    particle: WAX_OFF
    sound: BLOCK_AMETHYST_BLOCK_CHIME
    volume: 0.45
    pitch: 1.1
    particle-count: 5
    particle-speed: 0.015
    glow-color: aqua
  epic:
    particle: TOTEM_OF_UNDYING
    sound: BLOCK_BEACON_AMBIENT
    volume: 0.5
    pitch: 1.2
    particle-count: 6
    particle-speed: 0.02
    glow-color: light_purple

# Loot tier entries support three formats:
#   MATERIAL:amount:chance          — vanilla items (e.g. DIAMOND:2:0.85)
#   wm|weapon_title|amount|chance  — WeaponMechanics weapon (requires WM plugin)
#   codec|amount|chance|payload    — ItemStackCodec base64 from ItemStackCodec.encode()
# YAML map form is also supported:
#   - type: wm
#     weapon: Assault_Rifle
#     amount: 1
#     chance: 0.35
#   - type: codec
#     payload: "<base64>"
#     amount: 1
#     chance: 0.5
