# Saved Ruins raider player disguises (applied by LibsDisguisesBridge; keys must stay
# RuinsRaiderSteve/RuinsRaiderAlex - the bridge clones them by these names).
# Two Folia guards baked in:
#  1. Skins are embedded as SIGNED texture blobs (no Mojang session-server fetch).
#  2. The disguise player NAMES are >16 chars, which LibsDisguises treats as
#     un-resolvable and skips the async profile lookup whose Folia-global callback
#     trips the off-region entity check (refreshDisguise -> getEntityId). The bridge
#     overrides the display name after cloning, so the placeholders are never shown.
# Keep options minimal with explicit boolean args - bare boolean methods followed by
# another option fail LibsDisguises' parser ('failed to parse' at startup).
Disguises:
  RuinsRaiderSteve: 'player RuinsRaiderSteveNoLookup setSkin {"name":"MHF_Steve","id":"c06f89064c8a49119c29ea1dbd1aab82","properties":[{"signature":"","name":"textures","value":""}]} setNameVisible false setModifyBoundingBox false'
  RuinsRaiderAlex: 'player RuinsRaiderAlexNoLookup setSkin {"name":"MHF_Alex","id":"6ab4317889fd490597f60f67d9d76fd9","properties":[{"signature":"","name":"textures","value":""}]} setNameVisible false setModifyBoundingBox false'
