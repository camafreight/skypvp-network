name: SkyPvPExtractionMode
main: network.skypvp.extraction.ExtractionModePlugin
version: ${version}
api-version: '1.21'
folia-supported: true
depend:
  - SkyPvPCore
softdepend:
  - PlaceholderAPI
  - WorldGuard
  - WeaponMechanics
  - MythicMobs
  - Worlds
author: SkyPvP
description: Extraction gamemode plugin with Aether Breach match instances.
commands:
  breach:
    description: Aether Breach match controls
    usage: /breach <play|leave|status|list> [map]
    permission: skypvp.breach.use
permissions:
  skypvp.breach.use:
    description: Allows use of /breach commands
    default: true
