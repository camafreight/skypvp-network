server:
  id: ${SPVP_SERVER_ID}
  role: ${SPVP_SERVER_ROLE}
world-state:
  enabled: true
  preset-id: ${SPVP_PRESET_ID}
  preset-root: ${SPVP_PRESET_ROOT}
redis:
  enabled: true
  host: ${SPVP_REDIS_HOST}
  port: ${SPVP_REDIS_PORT}
  password: "${SPVP_REDIS_PASSWORD}"
  database: 0
postgres:
  enabled: true
  host: ${SPVP_POSTGRES_HOST}
  port: ${SPVP_POSTGRES_PORT}
  database: ${SPVP_POSTGRES_DATABASE}
  username: ${SPVP_POSTGRES_USERNAME}
  password: "${SPVP_POSTGRES_PASSWORD}"
chat:
  clear-lines: 150
  moderation:
    enabled: ${SPVP_CHAT_MODERATION_ENABLED}
    endpoint: "${SPVP_CHAT_MODERATION_ENDPOINT}"
    api-key: "${SPVP_CHAT_MODERATION_API_KEY}"
    language: eng
    category3-threshold: 0.75
    honor-review-recommended: true
    content-safety-min-severity: 2
    flags-before-warn: 2
    warns-before-mute: 2
    mute-duration-seconds: 3600
  translation:
    enabled: ${SPVP_CHAT_TRANSLATION_ENABLED}
    endpoint: "${SPVP_CHAT_TRANSLATION_ENDPOINT}"
    api-key: "${SPVP_CHAT_TRANSLATION_API_KEY}"
    region: "${SPVP_CHAT_TRANSLATION_REGION}"
  defaults:
    rank:
      priority: 0
      prefix: ""
      name_color: white
      name: "%player_name%"
      suffix: ""
      chat_color: white
    private:
      prefix: "<#FFD700>["
      name_color: gold
      name: "%player_name%"
      suffix: "<#FFD700> → %target_name%]<reset>"
      chat_color: gray
    party:
      prefix: "<#55FFFF>[Party] <reset>"
      name_color: aqua
      name: "%player_name%"
      suffix: ""
      chat_color: white
    staff:
      prefix: "<#FF5555>[Staff] <reset>"
      name_color: red
      name: "%player_name%"
      suffix: ""
      chat_color: white

resource-pack:
  # Proxy owns forced pack delivery (ItemAdder-style self-host on Velocity LB).
  enabled: false
  force: false
  url: "${SPVP_RESOURCE_PACK_URL}"
  sha1: "${SPVP_RESOURCE_PACK_SHA1}"
  uuid: "a7c3e9f1-5b2d-4e8a-9c1f-0d6b4a8e2f35"
  prompt: "<gold>SkyPvP</gold> <gray>requires its resource pack for weapons, lasers, and effects."
  kick-message: "<red>You must accept the SkyPvP resource pack to play."
  serve-locally: false
  serve-port: 8765
  public-host: "${SPVP_RESOURCE_PACK_PUBLIC_HOST}"
  local-file: "skypvp-core.zip"
  apply-timeout-seconds: 45
