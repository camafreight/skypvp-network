# Rendered from server-templates at container start.
# LuckPerms owns permission tables in skypvp_network (legacy network_ranks is unused).
server: ${SPVP_SERVER_ID}
storage-method: postgresql

data:
  address: ${SPVP_POSTGRES_HOST}:${SPVP_POSTGRES_PORT}
  database: skypvp_network
  username: skypvp
  password: "${SPVP_POSTGRES_PASSWORD}"

  pool-settings:
    maximum-pool-size: 10
    minimum-idle: 10
    maximum-lifetime: 1800000
    keepalive-time: 0
    connection-timeout: 5000

# Do not resend the full Brigadier command tree on permission/world-context changes
# (ClientboundCommandsPacket rebuilds cost ~57ms per player; see extraction config).
update-client-command-list: false

messaging-service: redis

redis:
  enabled: true
  address: ${SPVP_REDIS_HOST}:${SPVP_REDIS_PORT}
  password: "${SPVP_REDIS_PASSWORD}"
