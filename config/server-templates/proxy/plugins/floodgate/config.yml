# Floodgate on Velocity — shares key.pem with Geyser and backend Paper servers.

key-file-name: key.pem
username-prefix: "."
replace-spaces: true

disconnect:
  invalid-key: Please connect through the official Geyser proxy
  invalid-arguments-length: Expected {} arguments, got {}. Is Geyser up-to-date?

player-link:
  enabled: true
  require-link: false
  enable-own-linking: true
  allowed: true
  link-code-timeout: 300
  type: sqlite
  enable-global-linking: false

metrics:
  enabled: true

config-version: 3
