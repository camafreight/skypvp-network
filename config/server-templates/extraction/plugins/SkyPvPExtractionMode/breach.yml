# Aether Breach runtime configuration for extraction pods.
# Map templates: SPVP_MAP_TEMPLATE_ROOT or ../../config/map-templates
# Map registry: breach-maps.yml (this folder)

maps-file: breach-maps.yml

settings:
  max-breaches-per-pod: 9
  max-players-per-pod: 500
  min-players: 1
  starting-countdown-seconds: 15
  reset-delay-seconds: 8
  queue-timeout-seconds: 180
  extract-dwell-seconds: 30
  combat-tag-seconds: 15
  default-map: aether-ruins
  # Chests placed in the map world but not listed in meta.json lootChests use this tier.
  auto-discover-chests: true
  default-loot-tier: defaultChests
  # Fake beacon beam (per-player sendBlockChange) turns orange in the last N seconds of a match.
  extract-closing-soon-seconds: 300
  extract-force-close-seconds: 300
  extract-zone-min-open-seconds: 180
  # Random "anchor" zones per raid that stay open until the global force close,
  # so a raid can never have every extract closed while still joinable.
  extract-zone-min-open-count: 2
  extract-zone-warning-seconds: [60, 30, 10, 5, 4, 3, 2, 1]
  toxicity-damage-amount: 4.0
  toxicity-max-phase-seconds: 180
  extract-zone-particles-enabled: true
  # Custom ItemDisplay beam (skypvp:extract_beacon_beam) — rotating crossed planes, vanilla beacon_beam texture.
  extract-zone-beam-enabled: true
  # Cap on pillar height (blocks). Beam starts at zone floor and climbs toward world max.
  extract-zone-beam-height-blocks: 256
  # World-space cross-section width (model is a 4×4-unit span at scale 1).
  extract-zone-beam-thickness-blocks: 1.0
  extract-zone-fake-beacon-enabled: false
  extract-zone-cylinder-enabled: true
  enhanced-loot-chests: true
  place-configured-chest-blocks: true
  loot-chest-ambient-interval-ticks: 40
  loot-chest-ambient-radius: 15.0
  # bossSpawns in map meta.json use MythicMobs (mythicMobId). See plugins/MythicMobs/Mobs/.
  # Ruins gunners: RuinsRifleman, RuinsSMGunner, RuinsBreacher (WeaponMechanics + Infuse armor).

hitscan:
  enabled: true
  max-range-blocks: 120
  # particles = vanilla CRIT tracers; laser = resource-pack ItemDisplay beam (client cosmetics)
  tracer-mode: laser
  tracer-spacing-blocks: 3.0
  tracer-view-range-blocks: 48
  tracer-particle: CRIT
  laser:
    # Traveling bolt visuals (hitscan damage is still instant).
    # Lifespan (seconds) = travelDistance / velocity-blocks-per-second
    # Max timeout uses max-range-blocks the same way WeaponMechanics documents projectile lifespan.
    lifetime-ticks: 4
    # Slow enough to read mid-flight (~32 b/s ≈ 1.25s over 40 blocks). Damage stays hitscan-instant.
    velocity-blocks-per-second: 32
    bolt-length-blocks: 3.0
    # Length follows the shot (capped). Tip is approximated in eye-space (server cannot read FP item matrices):
    #   tip ≈ eye + look*forward + right*right + up*up
    # Derive forward from barrel tip in Blockbench: (tipZ - 8) / 16; tune right/up to match hand placement.
    # Beam tint + spectral outline both use color (glow-color is fallback).
    thickness: 0.25
    max-length-blocks: 64
    muzzle-forward-blocks: 0.55
    muzzle-right-blocks: 0.30
    muzzle-up-blocks: -0.18
    view-range-blocks: 64
    item-model: skypvp:laser_beam
    color: "#40F0FF"
    # Spectral outline on the bolt display; glowColorOverride matches color so outline ≠ white bloom.
    # The renderer also forces Display brightness 15/15 (emissive) regardless.
    glowing: true
    glow-color: "#40F0FF"
  impact:
    enabled: true
    view-range-blocks: 48
    block-particle-count: 6
    entity-particle-count: 4
    block-chip-overlay: true
    block-chip-damage: 0.22
    entity-particle: ENCHANTED_HIT
  visuals:
    defer-ticks: 1
    max-jobs-per-tick: 64
    queue-capacity: 2048
    max-tracer-points: 20
    async-prep: true
  combat:
    dispatch-threads: 4
    queue-capacity: 4096
    defer-ticks: 0
  simulated-projectile-weapons:
    - Combat_Knife
    - Stim
    - Grenade
    - Semtex
    - Flashbang
    - Cluster_Grenade
    - Airstrike
    - Sky_Torch
    - RPG_7
    - Fatman

loot-chest-fx:
  defaultChests:
    particle: END_ROD
    sound: BLOCK_NOTE_BLOCK_CHIME
    volume: 0.35
    pitch: 0.95
    particle-count: 4
    particle-speed: 0.01
    glow-color: yellow
  common:
    particle: END_ROD
    sound: BLOCK_NOTE_BLOCK_CHIME
    volume: 0.35
    pitch: 1.0
    particle-count: 4
    particle-speed: 0.01
    glow-color: yellow
  rare:
    particle: WAX_OFF
    sound: BLOCK_AMETHYST_BLOCK_CHIME
    volume: 0.45
    pitch: 1.1
    particle-count: 5
    particle-speed: 0.015
    glow-color: aqua
  epic:
    particle: TOTEM_OF_UNDYING
    sound: BLOCK_BEACON_AMBIENT
    volume: 0.5
    pitch: 1.2
    particle-count: 6
    particle-speed: 0.02
    glow-color: light_purple

