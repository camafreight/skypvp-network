# Ruins gunners — player-disguised raiders with WeaponMechanics (Infuse armor applied by SkyPvP on spawn).
# Combat, pathfinding, and targeting are handled entirely by SkyPvP Java state-tree AI.
RuinsRifleman:
  Type: HUSK
  Display: '&7Ruins Rifleman'
  Health: 84
  Damage: 0.1
  Faction: ruins_raider
  BossBar:
    Enabled: false
  Options:
    AlwaysShowName: false
    PreventOtherDrops: true
    PreventRandomEquipment: true
    PreventSunburn: true
    Despawn: false
    Persistent: true
    MovementSpeed: 0.24
    FollowRange: 36
    Silent: true
  Equipment:
  - weaponMechanicsWeapon{weapon=AK_47} HAND
  AIGoalSelectors:
  - clear
  AITargetSelectors:
  - clear

