# Ballistics tuned for COD-style engagement: fast, flat trajectories at typical PvP
# ranges. Vanilla WM defaults (Gravity 9.8, Drag 0.99) drop far too quickly in MC scale.

sub_machine_gun_projectile:
  Projectile_Settings:
    Type: "invisible"
    Maximum:
      Speed: 135
    Gravity: 0.75
    Drag:
      Base: 0.998
      In_Water: 0.992
      When_Raining_Or_Snowing: 0.996
  Through:
    Maximum_Through_Amount: 1
    Blocks:
      Default_Speed_Multiplier: 0.8
      Whitelist: true
      List:
        - "$GLASS"
    Entities:
      Allow_Any: true
      Default_Speed_Multiplier: 0.7

