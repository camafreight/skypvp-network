FN_FAL:
  Info:
    Weapon_Item:
      Type: "FEATHER"
      Name: "<gold>FN FAL"
      Lore:
        - "<gray>Semi-automatic battle rifle with a high rate of fire for faster follow up shots."
        - ""
        - "<gray>Weapon Statistics <gold>-<gray> 68.3"
        - "<gold>➣<gray> 74 <gold>⟸ <gray>Accuracy"
        - "<gold>➣<gray> 79 <gold>⟸ <gray>Damage"
        - "<gold>➣<gray> 70 <gold>⟸ <gray>Range"
        - "<gold>➣<gray> 59 <gold>⟸ <gray>Fire Rate"
        - "<gold>➣<gray> 60 <gold>⟸ <gray>Mobility"
        - "<gold>➣<gray> 68 <gold>⟸ <gray>Control"
      Unbreakable: true
      Hide_Flags: true
      Attributes:
        - "movement_speed -0.017"
      Deny_Use_In_Crafting: true
    Weapon_Get_Mechanics:
      - "Sound{sound=item.armor.equip_chain, pitch=0.75, listeners=Source{}}"
    Weapon_Equip_Delay: 30
    Cancel:
      Drop_Item: true
      Arm_Swing_Animation: true
      Break_Blocks: true
  Skin:
    Default: 6
    Scope: ADD 1000
    Sprint: ADD 2000
  Projectile: "assault_rifle_projectile"
  Shoot:
    Trigger:
      Main_Hand: "RIGHT_CLICK"
      Off_Hand: "RIGHT_CLICK"
      Circumstance:
        Swimming: "DENY"
        Sprinting: "DENY"
    Projectile_Speed: 128
    # No Selective_Fire: semi-auto only (Delay_Between_Shots). WM requires two fire modes
    # (Burst/Auto/Delay) for a selector, and this rifle has nothing to toggle to.
    Delay_Between_Shots: 5
    Fully_Automatic_Shots_Per_Second: 0  # SkyPvP PlayerFullAutoService owns cadence (Folia region-safe)
    Spread:
      Base_Spread: 3.2
      Modify_Spread_When:
        Zooming: 50%
        Sneaking: 50%
        In_Midair: 150%
    Recoil:
      Mean_X: 0.0
      Mean_Y: 1.2
      Variance_X: 0.2
      Variance_Y: 0.3
      Speed: 2.5
      Damping: 0.08
      Damping_Recovery: 0.2
      Smoothing: 0.35
      Max_Accumulation: 12.0
    Mechanics:
      - "CustomSound{sound=shoot.fnfal.loud, volume=2.5, noise=0.1, listenerConditions=[Range{max=48}]}"
  Reload:
    Trigger:
      Main_Hand: "DROP_ITEM"
      Off_Hand: "DROP_ITEM"
      Circumstance:
        Swimming: "DENY"
    Magazine_Size: 20
    Reload_Duration: 56
    Start_Mechanics:
      - "CustomSound{sound=reload.start.normal, volume=0.5, noise=0.1}"
    Finish_Mechanics:
      - "CustomSound{sound=reload.end.normal, volume=0.5, noise=0.1}"
  Damage:
    Base_Damage: 10.8
    Armor_Damage: 4
    Dropoff:
      - "10 -1.6"
      - "25 -3.2"
      - "50 -4.8"
  Scope:
    Trigger:
      Main_Hand: "LEFT_CLICK"
      Off_Hand: "LEFT_CLICK"
      Circumstance:
        Swimming: "DENY"
    Zoom_Amount: 1.5
    Shoot_Delay_After_Scope: 14
    Mechanics:
      - "CustomSound{sound=scope.in, volume=0.5, noise=0.1, listeners=Source{}}"
    Zoom_Off:
      Mechanics:
        - "CustomSound{sound=scope.out, volume=0.5, noise=0.1, listeners=Source{}}"
  Firearm_Action:
    Type: "SLIDE"
    Open:
      Time: 8
      Mechanics:
        - "Sound{sound=block.note_block.hat, volume=0.5, noise=0.1, listeners=Source{}}"
        - "Sound{sound=block.piston.contract, volume=0.5, noise=0.1, listeners=Source{}, delayBeforePlay=2}"
    Close:
      Time: 8
      Mechanics:
        - "Sound{sound=block.piston.extend, volume=0.5, noise=0.1, listeners=Source{}}"

  # The following options are added by WeaponMechanicsCosmetics, and you will
  # not see the changes take effect until you purchase it.

  Cosmetics:
    Muzzle_Flash: false
    Third_Person_Pose:
      Default: NONE
      Scope: BOW
      Reload: BLOCK
      Firearm_Action: CROSSBOW

  Show_Time:
    Reload:
      Item_Cooldown: true
    Weapon_Equip_Delay:
      Item_Cooldown: true
    Firearm_Actions:
      Item_Cooldown: true
    Shoot_Delay_After_Scope:
      Item_Cooldown: true
