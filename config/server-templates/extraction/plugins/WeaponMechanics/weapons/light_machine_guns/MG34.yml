MG34:
  Info:
    Weapon_Item:
      Type: "FEATHER"
      Name: "<gold>MG34"
      Lore:
        - "<gray>Fully automatic weapon with a high rate of fire and punishing 7.92 Mauser ammunition."
        - ""
        - "<gray>Weapon Statistics <gold>-<gray> 69.4"
        - "<gold>➣<gray> 72 <gold>⟸ <gray>Accuracy"
        - "<gold>➣<gray> 77 <gold>⟸ <gray>Damage"
        - "<gold>➣<gray> 78 <gold>⟸ <gray>Range"
        - "<gold>➣<gray> 70 <gold>⟸ <gray>Fire Rate"
        - "<gold>➣<gray> 48 <gold>⟸ <gray>Mobility"
        - "<gold>➣<gray> 72 <gold>⟸ <gray>Control"
      Unbreakable: true
      Hide_Flags: true
      Attributes:
        - "movement_speed -0.0296"
      Deny_Use_In_Crafting: true
    Weapon_Get_Mechanics:
      - "Sound{sound=item.armor.equip_chain, pitch=0.75, listeners=Source{}}"
    Weapon_Equip_Delay: 40
    Cancel:
      Drop_Item: true
      Arm_Swing_Animation: true
      Break_Blocks: true
  Skin:
    Default: 11
    Scope: ADD 1000
    Sprint: ADD 2000
  Projectile: "light_machine_gun_projectile"
  Shoot:
    Trigger:
      Main_Hand: "RIGHT_CLICK"
      Off_Hand: "RIGHT_CLICK"
      Circumstance:
        Swimming: "DENY"
        Sprinting: "DENY"
        Dual_Wielding: "DENY"
    Projectile_Speed: 125
    Fully_Automatic_Shots_Per_Second: 13
    Spread:
      Base_Spread: 3.5
      Modify_Spread_When:
        Zooming: 50%
        Sneaking: 50%
        In_Midair: 150%
    Recoil:
      Mean_X: 0.4
      Mean_Y: 2.0
      Variance_X: 0.3
      Variance_Y: 0.4
      Speed: 3.5
      Damping: 0.15
      Damping_Recovery: 0.15
      Smoothing: 0.35
      Max_Accumulation: 18.0
    Mechanics:
      - "CustomSound{sound=shoot.mg34.loud, volume=2.5, noise=0.1, listenerConditions=[Range{max=48}]}"
  Reload:
    Trigger:
      Main_Hand: "DROP_ITEM"
      Off_Hand: "DROP_ITEM"
    Magazine_Size: 75
    Reload_Duration: 73
    Start_Mechanics:
      - "CustomSound{sound=reload.start.heavy, volume=0.5, noise=0.1}"
    Finish_Mechanics:
      - "CustomSound{sound=reload.end.heavy, volume=0.5, noise=0.1}"
  Damage:
    Base_Damage: 10.4
    Armor_Damage: 3
    Dropoff:
      - "10 -1.44"
      - "25 -2.88"
      - "50 -4.32"
  Scope:
    Trigger:
      Main_Hand: "LEFT_CLICK"
      Off_Hand: "LEFT_CLICK"
    Zoom_Amount: 1.5
    Shoot_Delay_After_Scope: 22
    Mechanics:
      - "CustomSound{sound=scope.in, volume=0.5, noise=0.1, listeners=Source{}}"
    Zoom_Off:
      Mechanics:
        - "CustomSound{sound=scope.out, volume=0.5, noise=0.1, listeners=Source{}}"
  Firearm_Action:
    Type: "SLIDE"
    Open:
      Time: 8
      Mechanics:
        - "Sound{sound=block.note_block.hat, volume=0.5, noise=0.1, listeners=Source{}}"
        - "Sound{sound=block.piston.contract, volume=0.5, noise=0.1, listeners=Source{}, delayBeforePlay=2}"
    Close:
      Time: 8
      Mechanics:
        - "Sound{sound=block.piston.extend, volume=0.5, noise=0.1, listeners=Source{}}"

  # The following options are added by WeaponMechanicsCosmetics, and you will
  # not see the changes take effect until you purchase it.

  Cosmetics:
    Muzzle_Flash: false
    Third_Person_Pose:
      Default: NONE
      Scope: BOW
      Reload: BLOCK
      Firearm_Action: CROSSBOW

  Show_Time:
    Reload:
      Item_Cooldown: true
    Weapon_Equip_Delay:
      Item_Cooldown: true
    Firearm_Actions:
      Item_Cooldown: true
    Shoot_Delay_After_Scope:
      Item_Cooldown: true
