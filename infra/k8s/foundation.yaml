apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: skypvp-network
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: skypvp-network
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
